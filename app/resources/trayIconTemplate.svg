<!--
  mcpx Tray Icon — macOS Menu Bar Template Image
  All paths pure black; macOS tints for light/dark.

  Export:
    trayIconTemplate.png    → 16×16 (1x)
    trayIconTemplate@2x.png → 32×32 (2x)

  Uses the identical canonical mark (viewBox 0 0 100 93)
  as icon.svg and logo.svg — just scaled to 28×26.
-->
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">

  <!-- Canonical mark, same paths as icon.svg and logo.svg -->
  <svg x="2" y="3" width="28" height="26" viewBox="0 0 100 93">
    <g fill="none" stroke="black" stroke-linecap="round" stroke-width="8.5">
      <line x1="50" y1="29" x2="50" y2="41"/>
      <path d="M 50 41 H 24 Q 11 41 11 54 V 70"/>
      <line x1="50" y1="41" x2="50" y2="70"/>
      <path d="M 50 41 H 76 Q 89 41 89 54 V 70"/>
    </g>
    <circle cx="50" cy="15"   r="14"   fill="black"/>
    <circle cx="11" cy="81.5" r="11.5" fill="black"/>
    <circle cx="50" cy="81.5" r="11.5" fill="black"/>
    <circle cx="89" cy="81.5" r="11.5" fill="black"/>
  </svg>

</svg>
