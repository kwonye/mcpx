name: cli-release

on:
  push:
    branches:
      - main
    paths:
      - 'cli/**'
      - 'app/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  cli-release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    outputs:
      include_cli: ${{ steps.release_meta.outputs.include_cli }}
      include_desktop: ${{ steps.release_meta.outputs.include_desktop }}
      version: ${{ steps.release_meta.outputs.version }}
      tag: ${{ steps.release_meta.outputs.tag }}
      release_body: ${{ steps.release_meta.outputs.release_body }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            cli:
              - 'cli/**'
            app:
              - 'app/**'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - name: Update npm
        run: npm install -g npm@latest

      - name: Refresh tags
        run: git fetch --tags --force

      - name: Compute release metadata
        id: release_meta
        run: |
          CLI_CHANGED=${{ steps.filter.outputs.cli }}
          APP_CHANGED=${{ steps.filter.outputs.app }}

          if [ "$CLI_CHANGED" = "true" ]; then
            INCLUDE_CLI=true
            INCLUDE_DESKTOP=true
          else
            INCLUDE_CLI=false
            INCLUDE_DESKTOP=true
          fi

          VERSION=$(node .github/scripts/release-coordinator.mjs next-version --include-cli "$INCLUDE_CLI" --include-desktop "$INCLUDE_DESKTOP")
          TAG="v${VERSION}"
          RELEASE_BODY=$(node .github/scripts/release-coordinator.mjs release-body --include-cli "$INCLUDE_CLI" --include-desktop "$INCLUDE_DESKTOP" --version "$VERSION")

          echo "include_cli=${INCLUDE_CLI}" >> "$GITHUB_OUTPUT"
          echo "include_desktop=${INCLUDE_DESKTOP}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          {
            echo "release_body<<EOF"
            echo "$RELEASE_BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci
        working-directory: cli

      - name: Build
        run: npm run build
        working-directory: cli

      - name: Test
        run: npm test
        working-directory: cli

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set CLI release version
        if: steps.release_meta.outputs.include_cli == 'true'
        run: npm version "${{ steps.release_meta.outputs.version }}" --no-git-tag-version --allow-same-version
        working-directory: cli

      - name: Sync runtime version
        if: steps.release_meta.outputs.include_cli == 'true'
        run: npm run sync-version
        working-directory: cli

      - name: Sync desktop version for mixed release
        if: steps.release_meta.outputs.include_desktop == 'true'
        run: npm version "${{ steps.release_meta.outputs.version }}" --no-git-tag-version --allow-same-version
        working-directory: app

      - name: Commit and tag release
        env:
          INCLUDE_CLI: ${{ steps.release_meta.outputs.include_cli }}
          INCLUDE_DESKTOP: ${{ steps.release_meta.outputs.include_desktop }}
          RELEASE_VERSION: ${{ steps.release_meta.outputs.version }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          if [ "$INCLUDE_CLI" = "true" ]; then
            git add cli/package.json cli/package-lock.json cli/src/version.ts
          fi
          if [ "$INCLUDE_DESKTOP" = "true" ]; then
            git add app/package.json app/package-lock.json
          fi
          git commit -m "chore(release): v${RELEASE_VERSION} [skip ci]"
          TAG_BODY=$(node .github/scripts/release-coordinator.mjs tag-body --source-sha "$SOURCE_SHA" --include-cli "$INCLUDE_CLI" --include-desktop "$INCLUDE_DESKTOP" --version "$RELEASE_VERSION")
          git tag -a "$RELEASE_TAG" -m "$TAG_BODY"

      - name: Push release tag
        run: git push origin "${{ steps.release_meta.outputs.tag }}"

      - name: Debug OIDC claims
        if: steps.release_meta.outputs.include_cli == 'true'
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "Ref: ${{ github.ref }}"
          echo "Event name: ${{ github.event_name }}"
          echo ""
          echo "Expected npm subject claim format:"
          echo "repo:kwonye/mcpx:ref:refs/heads/main"
          echo ""
          echo "Checking OIDC environment variables:"
          echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN exists: ${ACTIONS_ID_TOKEN_REQUEST_TOKEN:+yes}"
          echo "ACTIONS_ID_TOKEN_REQUEST_URL: ${ACTIONS_ID_TOKEN_REQUEST_URL}"

      - name: Publish to npm
        if: steps.release_meta.outputs.include_cli == 'true'
        run: npm publish --provenance --access public
        working-directory: cli

      - name: Upload CLI artifacts
        if: steps.release_meta.outputs.include_cli == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: cli-dist
          path: cli/dist/
          if-no-files-found: warn

  desktop-release:
    needs: cli-release
    if: needs.cli-release.outputs.include_desktop == 'true'
    uses: ./.github/workflows/desktop-release.yml
    with:
      release_tag: ${{ needs.cli-release.outputs.tag }}
      build_version: ${{ needs.cli-release.outputs.version }}
      include_cli: ${{ needs.cli-release.outputs.include_cli == 'true' }}
    secrets: inherit

  create-release:
    needs: [cli-release, desktop-release]
    if: always() && needs.cli-release.result == 'success' && (needs.desktop-release.result == 'success' || needs.desktop-release.result == 'skipped')
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download CLI artifacts
        if: needs.cli-release.outputs.include_cli == 'true'
        uses: actions/download-artifact@v4
        with:
          name: cli-dist
          path: cli-dist/

      - name: Download desktop artifacts
        if: needs.desktop-release.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: desktop-macos-universal
          path: desktop-dist/

      - name: Create GitHub Release with all assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.cli-release.outputs.tag }}
          body: ${{ needs.cli-release.outputs.release_body }}
          overwrite_files: true
          files: |
            cli-dist/**/*
            desktop-dist/**/*.dmg
            desktop-dist/**/*.zip
            desktop-dist/**/*.blockmap
            desktop-dist/**/latest*.yml
          fail_on_unmatched_files: false
