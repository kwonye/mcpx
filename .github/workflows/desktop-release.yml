name: desktop-release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag to publish desktop assets to (example: v0.1.5)'
        required: true
        type: string
  workflow_call:
    inputs:
      release_tag:
        description: 'Tag to publish desktop assets to (example: v0.1.5)'
        required: true
        type: string
      build_version:
        description: 'Version to build (example: 0.1.5)'
        required: true
        type: string
      include_cli:
        description: 'Whether to include CLI assets'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  desktop-release:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check out requested release tag
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call'
        run: |
          git fetch --tags --force
          git checkout "${{ inputs.release_tag }}"

      - name: Refresh tags
        run: git fetch --tags --force

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            app/package-lock.json
            cli/package-lock.json

      - name: Determine release flow
        id: flow
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          INPUT_BUILD_VERSION: ${{ inputs.build_version }}
          INPUT_INCLUDE_CLI: ${{ inputs.include_cli }}
        run: |
          echo "build_desktop=false" >> "$GITHUB_OUTPUT"
          echo "publish_release=false" >> "$GITHUB_OUTPUT"
          echo "publish_tag=" >> "$GITHUB_OUTPUT"
          echo "build_version=" >> "$GITHUB_OUTPUT"
          echo "include_cli=false" >> "$GITHUB_OUTPUT"
          echo "include_desktop=false" >> "$GITHUB_OUTPUT"

          if [ "$EVENT_NAME" = "workflow_call" ]; then
            TAG="$INPUT_RELEASE_TAG"
            VERSION="$INPUT_BUILD_VERSION"
            echo "build_desktop=true" >> "$GITHUB_OUTPUT"
            echo "publish_release=true" >> "$GITHUB_OUTPUT"
            echo "publish_tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "build_version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "include_cli=$INPUT_INCLUDE_CLI" >> "$GITHUB_OUTPUT"
            echo "include_desktop=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Publishing desktop assets for workflow_call on tag $TAG."
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_RELEASE_TAG"
            VERSION="${TAG#v}"
            echo "build_desktop=true" >> "$GITHUB_OUTPUT"
            echo "publish_release=true" >> "$GITHUB_OUTPUT"
            echo "publish_tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "build_version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "include_desktop=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Publishing desktop assets to release tag $INPUT_RELEASE_TAG (manual run)."
          else
            echo "::notice::Event outside release flow; no desktop release action."
          fi

      - name: Install CLI dependencies
        if: steps.flow.outputs.build_desktop == 'true'
        run: npm ci
        working-directory: cli

      - name: Install desktop dependencies
        if: steps.flow.outputs.build_desktop == 'true'
        run: npm ci
        working-directory: app

      - name: Set desktop version for build
        if: steps.flow.outputs.build_desktop == 'true' && steps.flow.outputs.build_version != ''
        run: npm version "${{ steps.flow.outputs.build_version }}" --no-git-tag-version --allow-same-version
        working-directory: app

      - name: Build desktop bundle
        if: steps.flow.outputs.build_desktop == 'true'
        run: npm run build
        working-directory: app

      - name: Determine signing mode
        if: steps.flow.outputs.build_desktop == 'true'
        id: signing_mode
        env:
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=()
          for var in CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!var}" ]; then
              missing+=("${var}")
            fi
          done
          if [ "${#missing[@]}" -eq 0 ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Signing and notarization enabled."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Signing/notarization disabled for this run; missing secrets: ${missing[*]}"
          fi

      - name: Package macOS app (signed + notarized)
        if: steps.flow.outputs.build_desktop == 'true' && steps.signing_mode.outputs.enabled == 'true'
        run: npx electron-builder build --mac --universal --publish never --config.mac.hardenedRuntime=true --config.mac.gatekeeperAssess=false
        working-directory: app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Package macOS app (unsigned)
        if: steps.flow.outputs.build_desktop == 'true' && steps.signing_mode.outputs.enabled != 'true'
        run: npx electron-builder build --mac --universal --publish never
        working-directory: app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload build artifacts
        if: steps.flow.outputs.build_desktop == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-universal
          path: |
            app/dist/**/*.dmg
            app/dist/**/*.zip
            app/dist/**/*.blockmap
            app/dist/**/latest*.yml
          if-no-files-found: warn

      - name: Upload desktop artifacts to release
        if: steps.flow.outputs.build_desktop == 'true' && steps.flow.outputs.publish_release == 'true' && github.event_name != 'workflow_call'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.flow.outputs.publish_tag }}
          overwrite_files: true
          files: |
            app/dist/**/*.dmg
            app/dist/**/*.zip
            app/dist/**/*.blockmap
            app/dist/**/latest*.yml
          fail_on_unmatched_files: true
